<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Orange Beach Pink Boat · Dolphin Tales · Orange Beach & Gulf Shores, AL</title>
<meta name="description" content="Cruise the back bays of Orange Beach & Gulf Shores on the famous Pink Boat. Dolphin cruises, sunset tours, snorkeling, and private rentals for bachelorette parties, girls' trips, and groups up to 36.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* Keep all your original CSS here (I'm not pasting 1000+ lines again to save space) */
/* Just add this new neon live banner CSS at the bottom of your <style> tag */

:root {
  --pk: #f597a1;
  --nv: #212b61;
  --glow-pink: 0 0 15px #f597a1, 0 0 30px #f597a1, 0 0 50px #ff69b4;
  --glow-blue: 0 0 15px #00f0ff, 0 0 30px #00f0ff;
}

.live-module {
  background: linear-gradient(135deg, #0a1f4a, #1a3a7a, #0f2b5e);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 240, 255, 0.25), inset 0 0 80px rgba(245, 151, 161, 0.15);
  position: relative;
}

.live-module::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(255, 105, 180, 0.3), transparent 50%);
  animation: sparkle 8s infinite linear;
  pointer-events: none;
}

@keyframes sparkle {
  0% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
  100% { opacity: 0.6; transform: scale(1); }
}

.live-cond {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.cond-item {
  color: #fff;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cond-item strong {
  color: #00f0ff;
  text-shadow: 0 0 10px #00f0ff;
}

.tours-chips {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 20px;
}

.tour-chip {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,105,180,0.6);
  color: white;
  padding: 16px 20px;
  border-radius: 20px;
  min-width: 160px;
  text-align: center;
  box-shadow: var(--glow-pink);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.tour-chip:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 0 30px #ff69b4;
}

.tour-chip::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 40%;
  height: 300%;
  background: linear-gradient(transparent, rgba(255,255,255,0.4), transparent);
  transform: rotate(30deg);
  animation: shine 3s infinite;
}

@keyframes shine {
  0% { transform: translateX(-150%) rotate(30deg); }
  100% { transform: translateX(300%) rotate(30deg); }
}

.tours-book {
  background: linear-gradient(90deg, #f597a1, #ff69b4);
  color: #212b61;
  font-weight: 900;
  padding: 16px 32px;
  border-radius: 999px;
  box-shadow: 0 0 25px #ff69b4;
  font-size: 1.1rem;
}

.tours-book:hover {
  box-shadow: 0 0 40px #ff1493;
  transform: scale(1.05);
}

/* Rest of your original CSS stays the same... */
</style>
</head>
<body>

<!-- YOUR FULL ORIGINAL CONTENT GOES HERE -->
<!-- (hero, sections, moments-strip, amenities, tours, etc.) -->

<!-- Just replace your old live-module with this upgraded version -->

<div class="live-module" style="max-width:1280px; margin:30px auto 0; padding:0;">
  <div class="live-cond" id="live-cond">
    <!-- Filled by JavaScript -->
  </div>

  <div class="live-tours" style="padding:20px 24px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:space-between;">
    <div class="tours-lbl">
      <div class="tl1" style="color:#a0d8ff; font-size:0.8rem; font-weight:700;">TODAY'S CRUISES</div>
      <div class="tl2" style="font-size:1.35rem; font-weight:900; color:white;">Live Departures</div>
    </div>

    <div class="tours-chips" id="tour-chips">
      <!-- Filled by JavaScript -->
    </div>

    <a href="#booking" class="tours-book">Book Now →</a>
  </div>
</div>

<!-- Then the rest of your footer, scripts, etc. -->

<script>
// === SUPER NEON LIVE CRUISE BANNER SCRIPT ===
const TOURS = [
  { time24: "11:00", label: "Daytime Dolphin", price: "from $16" },
  { time24: "12:30", label: "Snorkel Island",  price: "from $40" },
  { time24: "17:00", label: "Sunset Cruise",   price: "from $18" }
];

const CONDITIONS = {
  air: "78°F",
  water: "70°F",
  wind: "9 mph SE",
  flag: "🟡 Yellow Flag"
};

function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function format12Hour(t) {
  let [h, m] = t.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
}

function getCurrentTime() {
  const now = new Date();
  let h = now.getHours();
  let m = now.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
}

function renderLiveBanner() {
  const nowMinutes = new Date().getHours() * 60 + new Date().getMinutes();
  
  const chipsContainer = document.getElementById("tour-chips");
  const condContainer = document.getElementById("live-cond");

  chipsContainer.innerHTML = "";

  // Show upcoming tours (or all if day is almost over)
  let upcoming = TOURS.filter(t => toMinutes(t.time24) > nowMinutes);
  if (upcoming.length === 0) upcoming = TOURS; // fallback to all

  upcoming.forEach(tour => {
    const chip = document.createElement("div");
    chip.className = "tour-chip";
    chip.innerHTML = `
      <div style="font-size:1.1rem; font-weight:800;">${format12Hour(tour.time24)}</div>
      <div style="margin:6px 0 4px; font-weight:700;">${tour.label}</div>
      <div style="color:#ffd7dd; font-size:0.95rem;">${tour.price}</div>
    `;
    chipsContainer.appendChild(chip);
  });

  // Live conditions
  if (condContainer) {
    condContainer.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px; color:#a0f0ff; font-weight:700;">
        <span style="font-size:1.4rem;">🌊</span> 
        LIVE CONDITIONS • ${getCurrentTime()}
      </div>
      <div style="color:#fff; margin-left:auto; display:flex; gap:20px; flex-wrap:wrap;">
        <span>Air <strong>${CONDITIONS.air}</strong></span>
        <span>Water <strong>${CONDITIONS.water}</strong></span>
        <span>Wind <strong>${CONDITIONS.wind}</strong></span>
        <span>${CONDITIONS.flag}</span>
      </div>
    `;
  }
}

// Run immediately and every 2 minutes
renderLiveBanner();
setInterval(renderLiveBanner, 120000);
</script>

</body>
</html>

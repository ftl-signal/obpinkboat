<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Orange Beach Pink Boat · Dolphin Tales · Orange Beach & Gulf Shores, AL</title>
<meta name="description" content="Cruise the back bays of Orange Beach & Gulf Shores on the famous Pink Boat. Dolphin cruises, sunset tours, snorkeling, and private rentals for bachelorette parties, girls' trips, and groups up to 36.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* Your original CSS goes here - paste all of it from the previous version */
:root {
  --pk: #f597a1;
  --nv: #212b61;
  --glow-pink: 0 0 15px #f597a1, 0 0 35px #ff69b4;
  --glow-cyan: 0 0 15px #00f0ff, 0 0 35px #00f0ff;
}

.live-module {
  background: linear-gradient(135deg, #0a1f4a 0%, #1a3a7a 50%, #0f2b5e 100%);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 25px 70px rgba(0, 240, 255, 0.3), inset 0 0 60px rgba(245, 151, 161, 0.2);
  position: relative;
  max-width: 1280px;
  margin: 30px auto 40px;
}

.live-module::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,105,180,0.25) 0%, transparent 70%);
  animation: neon-pulse 6s infinite ease-in-out;
  pointer-events: none;
  opacity: 0.7;
}

@keyframes neon-pulse {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
  50% { transform: scale(1.08) rotate(2deg); opacity: 1; }
}

.live-cond {
  background: rgba(255,255,255,0.09);
  backdrop-filter: blur(12px);
  padding: 18px 26px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.18);
}

.cond-item {
  color: #e0f0ff;
  font-size: 0.96rem;
  display: flex;
  align-items: center;
  gap: 7px;
}

.cond-item strong {
  color: #00f8ff;
  text-shadow: 0 0 12px #00f8ff;
}

.tours-chips {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  padding: 22px 26px;
}

.tour-chip {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(245,151,161,0.7);
  color: white;
  padding: 16px 22px;
  border-radius: 22px;
  min-width: 165px;
  text-align: center;
  box-shadow: var(--glow-pink);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.tour-chip:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 40px #ff69b4;
  border-color: #ff69b4;
}

.tour-chip::after {
  content: '';
  position: absolute;
  top: -100%;
  left: -50%;
  width: 40%;
  height: 400%;
  background: linear-gradient(transparent, rgba(255,255,255,0.45), transparent);
  transform: rotate(25deg);
  animation: shine 4s infinite linear;
}

@keyframes shine {
  0% { transform: translateX(-120%) rotate(25deg); }
  100% { transform: translateX(300%) rotate(25deg); }
}

.tours-book {
  background: linear-gradient(90deg, #f597a1, #ff4d94);
  color: #212b61;
  font-weight: 900;
  font-size: 1.05rem;
  padding: 16px 34px;
  border-radius: 999px;
  box-shadow: 0 0 30px #ff69b4;
  transition: all 0.3s;
}

.tours-book:hover {
  box-shadow: 0 0 45px #ff1493;
  transform: scale(1.04);
}

/* Paste the rest of your original styles below this point */
</style>
</head>
<body>

<!-- Paste all your original HTML content here (hero, sections, moments-strip, amenities, testimonials, etc.) -->

<!-- Replace your old live banner with this new neon version -->
<div class="live-module">
  <div class="live-cond" id="live-cond">
    <!-- JavaScript will fill this -->
  </div>

  <div style="padding: 0 26px 26px;">
    <div class="tours-chips" id="tour-chips">
      <!-- JavaScript will fill the cruise chips -->
    </div>
    
    <div style="text-align:center; margin-top:10px;">
      <a href="#booking" class="tours-book">Book Your Cruise Now</a>
    </div>
  </div>
</div>

<!-- Your footer and the rest of the page -->

<script>
// Neon Live Banner Script
const TOURS = [
  { time24: "11:00", label: "Daytime Dolphin", price: "from $16" },
  { time24: "12:30", label: "Snorkel Island",  price: "from $40" },
  { time24: "17:00", label: "Sunset Cruise",   price: "from $18" }
];

function toMinutes(time) {
  const [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function format12Hour(time) {
  let [h, m] = time.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function getCurrentTime() {
  const now = new Date();
  let h = now.getHours();
  let m = now.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function renderLiveBanner() {
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
  const chips = document.getElementById("tour-chips");
  const cond = document.getElementById("live-cond");

  chips.innerHTML = "";

  let upcoming = TOURS.filter(t => toMinutes(t.time24) > nowMin);
  if (upcoming.length === 0) upcoming = TOURS;

  upcoming.forEach(tour => {
    const div = document.createElement("div");
    div.className = "tour-chip";
    div.innerHTML = `
      <div style="font-size:1.15rem; font-weight:800;">${format12Hour(tour.time24)}</div>
      <div style="margin:8px 0 6px; font-weight:700;">${tour.label}</div>
      <div style="color:#ffd7dd;">${tour.price}</div>
    `;
    chips.appendChild(div);
  });

  if (cond) {
    cond.innerHTML = `
      <div style="display:flex; align-items:center; gap:10px; color:#a0f0ff; font-weight:700;">
        🌊 LIVE CONDITIONS • ${getCurrentTime()}
      </div>
      <div style="margin-left:auto; display:flex; gap:22px; color:#e0f0ff; flex-wrap:wrap;">
        <span>Air <strong>78°F</strong></span>
        <span>Water <strong>70°F</strong></span>
        <span>Wind <strong>9 mph SE</strong></span>
        <span>🟡 Yellow Flag</span>
      </div>
    `;
  }
}

renderLiveBanner();
setInterval(renderLiveBanner, 120000); // update every 2 minutes
</script>

</body>
</html>
